<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Memory Flows — live</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Personal ability profile / memory flows</h1>

  <div class="stage">

      <img id="diagram" src="personal.svg" alt="Personal memory architecture">
      <div id="overlay"></div>
    </div>
  </div>
  <script src="personal-config.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
