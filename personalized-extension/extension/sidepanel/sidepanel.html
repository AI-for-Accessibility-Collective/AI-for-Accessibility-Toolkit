<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voice — Agentic A11y</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="vp-header">
    <span class="vp-title">🎤 Voice</span>
    <button id="vp-proposals" class="vp-pill" hidden role="status" title="Suggestions waiting for your OK"></button>
    <span id="vp-status" class="vp-status disconnected">disconnected</span>
  </header>

  <main class="vp-main">
    <div id="vp-error" class="vp-error" hidden></div>
    <button id="vp-open-mic-settings" class="vp-btn vp-btn-link" hidden>Open mic settings</button>

    <div id="vp-empty" class="vp-empty">
      Press <strong>Start</strong> and just talk. Try:
      <em>"make the text bigger"</em>, <em>"what's on this page?"</em>,
      <em>"I have trouble reading small text — what can help?"</em>, or
      <em>"what do you remember about me?"</em>. You can also type below.
      <span class="vp-privacy">Voice and page text are processed by Google
      Gemini using your own API key.</span>
    </div>

    <ul id="vp-transcript" class="vp-transcript" aria-live="polite"></ul>
  </main>

  <footer class="vp-controls">
    <form id="vp-text-form" class="vp-text-form" hidden>
      <label class="sr-only" for="vp-text-input">Type a message to the voice assistant</label>
      <input id="vp-text-input" type="text" autocomplete="off" placeholder="Type instead of speaking…">
      <button type="submit" class="vp-btn" aria-label="Send typed message">Send</button>
    </form>
    <button id="vp-start" class="vp-btn vp-btn-primary">Start</button>
    <button id="vp-mic" class="vp-btn vp-btn-icon" hidden title="Mute / unmute mic" aria-label="Toggle microphone">
      <span class="vp-mic-icon">🎙️</span>
    </button>
    <label class="vp-toggle" hidden id="vp-bg-wrapper">
      <input type="checkbox" id="vp-bg-toggle">
      <span>Background</span>
    </label>
    <button id="vp-restart" class="vp-btn" hidden title="Restart with a fresh conversation" aria-label="Restart">↻ Restart</button>
    <button id="vp-end" class="vp-btn vp-btn-danger" hidden>End</button>
  </footer>

  <script src="sidepanel.bundle.js"></script>
</body>
</html>
