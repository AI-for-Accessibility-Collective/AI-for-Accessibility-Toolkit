name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Build personalized extension
        env:
          PUPPETEER_SKIP_DOWNLOAD: "1"
        run: |
          cd personalized-extension
          npm ci
          npm run build

      - name: Check committed build artifacts are fresh
        # Every generated-but-committed file: the top-level bundles and the
        # personalized-extension lib/* built from toolkit/. All are staged in
        # git, so `git diff --exit-code` has a baseline to compare against.
        run: |
          git diff --exit-code -- \
            extension/content.bundle.js \
            extension/popup.bundle.js \
            cli/cli-tools.bundle.js \
            personalized-extension/extension/lib/taxonomy.js \
            personalized-extension/extension/lib/datastore.js \
            personalized-extension/extension/lib/librarian.js \
            personalized-extension/extension/lib/tools-registry.js \
            personalized-extension/extension/lib/skills-db.js \
          || (echo "Committed build artifacts are stale — run the builds and commit the result" && exit 1)

      - name: Toolkit core tests
        run: |
          node toolkit/test/ability-model-test.js
          node toolkit/test/broker-test.js
          node toolkit/test/skill-test.js
          node toolkit/test/skill-edge-test.js
          node toolkit/test/skill-apply-test.js
          node toolkit/test/scenario-test.js
          node toolkit/test/codesign-scenarios-test.js
          node toolkit/hosts/xr-demo/demo.js
          node toolkit/hosts/skill-demo/demo.js

      - name: Tools & profile tests
        # Every tools/test/*-test.js (auditors/adapters + each standalone
        # adapter test + profiles). browser-validate.js is intentionally NOT a
        # *-test.js file — it needs a real Chromium and runs locally only.
        run: |
          for t in tools/test/*-test.js; do echo "== $t"; node "$t" || exit 1; done

      - name: Librarian regression tests
        run: |
          cd personalized-extension
          node test/librarian-test.js
          node test/run-tests.js
          # Puppeteer smoke tests (skills-page, demo-beats) run locally — CI
          # skips the Chromium download, so they can't launch a browser here.

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CLI
        run: pip install -e .

      - name: Test CLI import
        run: python -c "from cli import cli; print('CLI imports OK')"

      - name: List tools
        run: ai4a11y list tools --json
